<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px;
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        font-size: 13px;
        color: #ece9f5;
        background: #150f2b;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 4px;
        background: linear-gradient(135deg, #b69bff, #22d3ee);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .sub {
        color: #9890b8;
        font-size: 11px;
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin: 10px 0;
      }
      .row label {
        margin: 0;
      }
      input[type="number"] {
        width: 60px;
        box-sizing: border-box;
        padding: 6px 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        font-size: 12px;
        background: #1b1338;
        color: #ece9f5;
      }
      button {
        margin-top: 8px;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #7c3aed, #06b6d4);
        color: #fff;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary {
        background: rgba(255, 255, 255, 0.06);
        color: #ece9f5;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      #status {
        margin-top: 12px;
        font-size: 11px;
        color: #9890b8;
        white-space: pre-wrap;
        max-height: 90px;
        overflow: auto;
      }
      .muted {
        color: #9890b8;
        font-size: 11px;
      }
      hr {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin: 14px 0;
      }
    </style>
  </head>
  <body>
    <h1>aooprice</h1>
    <div class="sub">ตั้งค่า keyword/ชื่อร้านได้ที่หน้าเว็บ · ที่นี่แค่สั่งดึง</div>

    <button id="openWeb" class="secondary">⚙️ เปิดหน้าตั้งค่าบนเว็บ</button>

    <hr />

    <div class="muted" style="margin-bottom: 6px">ดึงจาก platform:</div>
    <div class="row" style="gap: 14px; margin-top: 4px">
      <label style="display: flex; gap: 5px; align-items: center; margin: 0">
        <input type="checkbox" id="pf-shopee" style="width: auto" checked />
        Shopee
      </label>
      <label style="display: flex; gap: 5px; align-items: center; margin: 0">
        <input type="checkbox" id="pf-tiktok" style="width: auto" checked />
        TikTok
      </label>
      <label style="display: flex; gap: 5px; align-items: center; margin: 0">
        <input type="checkbox" id="pf-lazada" style="width: auto" checked />
        Lazada
      </label>
    </div>

    <hr />

    <div class="row">
      <input type="checkbox" id="autoEnabled" style="width: auto" />
      <label for="autoEnabled">เปิด Auto ดึงทุก</label>
      <input id="intervalHours" type="number" min="1" value="24" style="margin-left: auto" />
      <span class="muted">ชม.</span>
    </div>

    <button id="save" class="secondary">บันทึก Auto</button>
    <button id="runNow">⟳ ดึงเดี๋ยวนี้ (ทุก keyword)</button>

    <div id="status"></div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
